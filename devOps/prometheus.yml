global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'rnp-server'
    static_configs:
      - targets: ['server:5000']
    metrics_path: '/metrics'  # Assuming you add /metrics endpoint

  - job_name: 'rnp-client'
    static_configs:
      - targets: ['client:3000']
    metrics_path: '/metrics'  # If Next.js has metrics

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']