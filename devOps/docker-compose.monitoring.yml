version: '3.9'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: rnp-prometheus
    restart: unless-stopped
    ports: ["9090:9090"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks: [rnp-net]

  grafana:
    image: grafana/grafana:latest
    container_name: rnp-grafana
    restart: unless-stopped
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme_now}
    volumes:
      - grafana_data:/var/lib/grafana
    networks: [rnp-net]

volumes:
  grafana_data:

networks:
  rnp-net:
    external: true