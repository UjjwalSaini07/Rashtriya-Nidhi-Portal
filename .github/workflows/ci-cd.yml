name: CI/CD — Rashtriya Nidhi Portal

on:
  push:
    branches: []
  pull_request:
    branches: []

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Lint frontend
        working-directory: frontend
        run: npm ci && npm run lint

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
      - name: Audit backend deps
        working-directory: backend
        run: npm ci && npm audit --audit-level=high
      - name: Audit frontend deps
        working-directory: frontend
        run: npm ci && npm audit --audit-level=high

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      mongo:
        image: mongo:7.0
        ports: ['27017:27017']
      redis:
        image: redis:7.2-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Test backend starts cleanly
        working-directory: backend
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/rnp_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: testsecretminimum32charslong_abc123
          REFRESH_TOKEN_SECRET: testrefreshsecretminimum32chars_abc
          AES_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          BCRYPT_ROUNDS: '4'
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api
        run: npm ci && npm run build

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build-test, security]
    if: github.ref == 'refs/heads/main'
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/rnp-backend:${{ github.sha }},ghcr.io/${{ github.repository }}/rnp-backend:latest
      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/rnp-frontend:${{ github.sha }},ghcr.io/${{ github.repository }}/rnp-frontend:latest

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/rnp
            docker compose pull
            docker compose up -d --no-deps backend frontend
            docker system prune -f
            echo "Deployed at $(date)"
