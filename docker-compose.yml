version: '3.9'

services:
  server:
    build: { context: ./server, dockerfile: Dockerfile }
    container_name: rnp-server
    restart: unless-stopped
    ports: ["5000:5000"]
    env_file: ./server/.env
    depends_on: [mongo, redis]
    volumes: ["./server/uploads:/app/uploads", "./server/logs:/app/logs"]
    networks: [rnp-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    build: { context: ./client, dockerfile: Dockerfile }
    container_name: rnp-client
    restart: unless-stopped
    ports: ["3000:3000"]
    env_file: ./client/.env.local
    depends_on: [server]
    networks: [rnp-net]

  mongo:
    image: mongo:7.0
    container_name: rnp-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: rnp_admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme_now}
      MONGO_INITDB_DATABASE: rnp_db
    networks: [rnp-net]

  redis:
    image: redis:7.2-alpine
    container_name: rnp-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_now} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes: [redis_data:/data]
    networks: [rnp-net]

  nginx:
    image: nginx:1.25-alpine
    container_name: rnp-nginx
    restart: unless-stopped
    ports: ["80:80"]
    volumes: ["./docker/nginx.conf:/etc/nginx/nginx.conf:ro"]
    depends_on: [client, server]
    networks: [rnp-net]

volumes:
  mongo_data:
  redis_data:

networks:
  rnp-net:
    driver: bridge
